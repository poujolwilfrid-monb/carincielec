<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>OG Image — Carincielec</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
    }
    .card {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0F172A 0%, #1E3A5F 50%, #1F2937 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 60px 80px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
      background-size: 80px 80px;
    }
    .text {
      position: relative;
      z-index: 2;
      max-width: 650px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }
    .logo img {
      width: 56px;
      height: 56px;
      background: white;
      border-radius: 50%;
      padding: 4px;
    }
    .logo span {
      font-size: 1.8rem;
      font-weight: 700;
      color: #FFFFFF;
    }
    .logo .elec {
      color: #E5A913;
      margin-left: 0;
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      line-height: 1.15;
      color: #FFFFFF;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
    }
    .tag {
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #E5A913;
      margin-bottom: 16px;
    }
    .personnage {
      position: absolute;
      right: 40px;
      bottom: 0;
      height: 90%;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="text">
      <div class="logo">
        <img src="logo-icon (200 x 200 px) (1).svg" alt="Logo">
        <span>carinci<span class="elec">elec</span></span>
      </div>
      <p class="tag">Sainte-Lucie de Porto-Vecchio et environs</p>
      <h1>Votre électricien en Corse du Sud,<br>20 ans d'expertise à votre service.</h1>
      <p>Installation, rénovation, dépannage. La garantie d'un artisan de confiance et de proximité.</p>
    </div>
    <img src="personnage-bonjour.webp" alt="Personnage" class="personnage">
  </div>
</body>
</html>
